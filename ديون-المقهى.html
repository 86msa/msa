<!-- ===== JAVASCRIPT ===== -->
<script>
// ---------- STORAGE ----------
const DB = {
  load: (k,d=[]) => { try{ return JSON.parse(localStorage.getItem(k))||d }catch{ return d } },
  save: (k,v) => localStorage.setItem(k, JSON.stringify(v))
};
let creditors = DB.load('dms_creditors');
let debts     = DB.load('dms_debts');
let payments  = DB.load('dms_payments');
const save = () => { DB.save('dms_creditors',creditors); DB.save('dms_debts',debts); DB.save('dms_payments',payments); };
const uid  = () => Date.now().toString(36)+Math.random().toString(36).slice(2,5);

// ---------- AUTH ----------
function login() {
  if (document.getElementById('loginPass').value === 'admin') {
    sessionStorage.setItem('dms_auth','1');
    document.getElementById('loginScreen').classList.add('hidden');
    document.getElementById('app').classList.remove('hidden');
    initApp();
  } else {
    document.getElementById('loginErr').classList.remove('hidden');
    document.getElementById('loginPass').value='';
  }
}
function logout() { sessionStorage.removeItem('dms_auth'); location.reload(); }
window.onload = () => {
  if (sessionStorage.getItem('dms_auth')==='1') {
    document.getElementById('loginScreen').classList.add('hidden');
    document.getElementById('app').classList.remove('hidden');
    initApp();
  }
  document.getElementById('dt-freq').addEventListener('change', e => {
    document.getElementById('customFreqDiv').classList.toggle('hidden', e.target.value!=='custom');
    updatePreview();
  });
  ['dt-total','dt-inst','dt-start','dt-customdays'].forEach(id =>
    document.getElementById(id).addEventListener('input', updatePreview));
};

// ---------- TABS ----------
const TABS = ['dashboard','creditors','debts'];
function openTab(t) {
  TABS.forEach(id => {
    document.getElementById('tab-content-'+id).classList.add('hidden');
    document.getElementById('tab-'+id).classList.remove('active-tab');
  });
  document.getElementById('tab-content-'+t).classList.remove('hidden');
  document.getElementById('tab-'+t).classList.add('active-tab');
  if(t==='dashboard') renderDashboard();
  if(t==='creditors') renderCreditors();
  if(t==='debts')     renderDebts();
}

// ---------- MODALS ----------
function openModal(id) { document.getElementById(id).classList.remove('hidden'); }
function closeModal(id) { document.getElementById(id).classList.add('hidden'); }

// ---------- HELPERS ----------
const fmt     = n => Number(n||0).toLocaleString('ar-IQ');
const fmtDate = d => d ? new Date(d+'T00:00:00').toLocaleDateString('ar-IQ',{year:'numeric',month:'long',day:'numeric'}) : '—';
const today   = () => new Date().toISOString().split('T')[0];
const daysDiff= d => Math.round((new Date(d+'T00:00:00')-new Date(today()+'T00:00:00'))/(864e5));
const creditorName = id => { const c=creditors.find(x=>x.id===id); return c?c.name:'—'; };

// ---------- SCHEDULE GENERATION ----------
function buildSchedule(debt) {
  const freq = debt.freq==='custom' ? Number(debt.customDays) : Number(debt.freq);
  const total = Number(debt.totalAmount);
  const inst  = Number(debt.instAmount);
  const start = new Date(debt.startDate+'T00:00:00');
  const schedule = [];
  let remaining = total;
  let i = 0;
  while (remaining > 0.009) {
    const amount = Math.min(remaining, inst);
    const due = new Date(start);
    due.setDate(due.getDate() + i * freq);
    schedule.push({ idx: i, amount, dueDate: due.toISOString().split('T')[0] });
    remaining -= amount;
    i++;
  }
  return schedule;
}

function getInstPayment(debtId, idx) {
  return payments.filter(p=>p.debtId===debtId && p.instIdx===idx);
}
function isInstPaid(debtId, idx) {
  return getInstPayment(debtId, idx).length > 0;
}
function totalPaid(debtId) {
  return payments.filter(p=>p.debtId===debtId).reduce((s,p)=>s+Number(p.amount),0);
}
function instStatus(debtId, inst) {
  if (isInstPaid(debtId, inst.idx)) return 'paid';
  const d = daysDiff(inst.dueDate);
  if (d < 0) return 'overdue';
  if (d <= 7) return 'soon';
  return 'upcoming';
}

// ---------- ALERTS ----------
function buildAlerts() {
  const alerts = [];
  debts.forEach(debt => {
    const sched = buildSchedule(debt);
    sched.forEach(inst => {
      const st = instStatus(debt.id, inst);
      if (st==='overdue' || st==='soon') {
        alerts.push({ debt, inst, st, days: daysDiff(inst.dueDate) });
      }
    });
  });
  return alerts.sort((a,b)=>a.days-b.days);
}

function renderAlerts() {
  const alerts = buildAlerts();
  const banner = document.getElementById('alertBanner');
  if (!alerts.length) { banner.classList.add('hidden'); return; }
  banner.classList.remove('hidden');
  banner.className = 'no-print px-4 py-3 ' + (alerts.some(a=>a.st==='overdue') ? 'pulse-red' : 'bg-amber-100');
  banner.innerHTML = `<div class="max-w-6xl mx-auto space-y-1">
    ${alerts.map(a => {
      const dLabel = a.days<0 ? `متأخرة ${Math.abs(a.days)} يوم` : a.days===0 ? 'اليوم!' : `بعد ${a.days} يوم`;
      const color  = a.st==='overdue' ? 'text-red-800 font-black' : 'text-amber-800 font-bold';
      return `<div class="flex items-center justify-between gap-3 text-sm flex-wrap">
        <span class="${color}">
          ${a.st==='overdue'?'🚨':'⏰'} دفعة لـ <b>${creditorName(a.debt.creditorId)}</b>
          — ${a.debt.desc} — مبلغ: <b>${fmt(a.inst.amount)} د.ع</b> — ${dLabel}
        </span>
        <button onclick="openPayModal('${a.debt.id}',${a.inst.idx})"
          class="bg-white border border-current px-3 py-1 rounded-lg text-xs font-bold hover:bg-gray-50 transition shrink-0">
          تسديد الآن
        </button>
      </div>`;
    }).join('<hr class="border-current opacity-20 my-0.5">')}
  </div>`;
}

// ---------- INIT ----------
function initApp() {
  refreshCreditorSelect();
  renderAlerts();
  openTab('dashboard');
}

// ---------- DASHBOARD ----------
function renderDashboard() {
  renderAlerts();
  const totalDebt = debts.reduce((s,d)=>s+Number(d.totalAmount),0);
  const totalPaidAll = debts.reduce((s,d)=>s+totalPaid(d.id),0);
  const totalRem  = totalDebt - totalPaidAll;
  const activeCount = debts.filter(d=>totalPaid(d.id)<Number(d.totalAmount)).length;

  document.getElementById('kpi-total').textContent  = fmt(totalDebt);
  document.getElementById('kpi-paid').textContent   = fmt(totalPaidAll);
  document.getElementById('kpi-rem').textContent    = fmt(totalRem);
  document.getElementById('kpi-active').textContent = activeCount;

  // Upcoming (next 30 days, not paid)
  const upcoming = [];
  const overdue  = [];
  debts.forEach(debt => {
    buildSchedule(debt).forEach(inst => {
      const st = instStatus(debt.id, inst);
      const d  = daysDiff(inst.dueDate);
      if (st==='soon' || (st==='upcoming' && d<=30)) upcoming.push({debt,inst,d});
      if (st==='overdue') overdue.push({debt,inst,d});
    });
  });
  upcoming.sort((a,b)=>a.d-b.d);
  overdue.sort((a,b)=>a.d-b.d);

  const upDiv = document.getElementById('upcomingList');
  if (!upcoming.length) {
    upDiv.innerHTML='<p class="text-gray-400 text-sm text-center py-4">لا توجد دفعات قادمة خلال 30 يوم 🎉</p>';
  } else {
    upDiv.innerHTML=`<div class="overflow-x-auto"><table class="w-full text-sm">
      <thead><tr class="bg-gray-50 text-gray-500">
        <th class="px-3 py-2 text-right font-semibold">الدائن</th>
        <th class="px-3 py-2 text-right font-semibold">الدين</th>
        <th class="px-3 py-2 text-right font-semibold">موعد الدفعة</th>
        <th class="px-3 py-2 text-right font-semibold">المبلغ</th>
        <th class="px-3 py-2 text-right font-semibold">الحالة</th>
        <th class="px-3 py-2"></th>
      </tr></thead><tbody>
      ${upcoming.map(({debt,inst,d})=>`<tr class="border-t hover:bg-amber-50">
        <td class="px-3 py-2 font-semibold">${creditorName(debt.creditorId)}</td>
        <td class="px-3 py-2 text-gray-500">${debt.desc}</td>
        <td class="px-3 py-2">${fmtDate(inst.dueDate)}</td>
        <td class="px-3 py-2 font-bold">${fmt(inst.amount)} د.ع</td>
        <td class="px-3 py-2">${d===0?'<span class="bg-orange-100 text-orange-700 text-xs px-2 py-0.5 rounded-full font-bold">اليوم!</span>':d<=7?`<span class="bg-amber-100 text-amber-700 text-xs px-2 py-0.5 rounded-full font-bold">بعد ${d} يوم</span>`:`<span class="bg-blue-50 text-blue-700 text-xs px-2 py-0.5 rounded-full">بعد ${d} يوم</span>`}</td>
        <td class="px-3 py-2"><button onclick="openPayModal('${debt.id}',${inst.idx})" class="text-xs bg-green-100 hover:bg-green-200 text-green-700 px-2 py-1 rounded-lg font-bold transition">تسديد</button></td>
      </tr>`).join('')}
      </tbody></table></div>`;
  }

  const ovDiv = document.getElementById('overdueList');
  if (!overdue.length) {
    ovDiv.innerHTML='<p class="text-gray-400 text-sm text-center py-4">لا توجد دفعات متأخرة ✅</p>';
  } else {
    ovDiv.innerHTML=`<div class="overflow-x-auto"><table class="w-full text-sm">
      <thead><tr class="bg-red-50 text-gray-500">
        <th class="px-3 py-2 text-right font-semibold">الدائن</th>
        <th class="px-3 py-2 text-right font-semibold">الدين</th>
        <th class="px-3 py-2 text-right font-semibold">كان موعدها</th>
        <th class="px-3 py-2 text-right font-semibold">المبلغ</th>
        <th class="px-3 py-2 text-right font-semibold">تأخير</th>
        <th class="px-3 py-2"></th>
      </tr></thead><tbody>
      ${overdue.map(({debt,inst,d})=>`<tr class="border-t hover:bg-red-50">
        <td class="px-3 py-2 font-semibold">${creditorName(debt.creditorId)}</td>
        <td class="px-3 py-2 text-gray-500">${debt.desc}</td>
        <td class="px-3 py-2 text-red-700">${fmtDate(inst.dueDate)}</td>
        <td class="px-3 py-2 font-bold">${fmt(inst.amount)} د.ع</td>
        <td class="px-3 py-2"><span class="bg-red-100 text-red-700 text-xs px-2 py-0.5 rounded-full font-black">${Math.abs(d)} يوم</span></td>
        <td class="px-3 py-2"><button onclick="openPayModal('${debt.id}',${inst.idx})" class="text-xs bg-red-100 hover:bg-red-200 text-red-700 px-2 py-1 rounded-lg font-bold transition">تسديد</button></td>
      </tr>`).join('')}
      </tbody></table></div>`;
  }
}

// ---------- CREDITORS ----------
function refreshCreditorSelect() {
  const sel = document.getElementById('dt-creditor');
  const val = sel.value;
  sel.innerHTML = '<option value="">-- اختر الدائن --</option>' +
    creditors.map(c=>`<option value="${c.id}">${c.name}</option>`).join('');
  sel.value = val;
}

function saveCreditor() {
  const name = document.getElementById('cr-name').value.trim();
  if(!name) return alert('الرجاء إدخال الاسم');
  creditors.push({ id:uid(), name, phone:document.getElementById('cr-phone').value.trim(), notes:document.getElementById('cr-notes').value.trim() });
  save();
  closeModal('modalCreditor');
  ['cr-name','cr-phone','cr-notes'].forEach(id=>document.getElementById(id).value='');
  refreshCreditorSelect();
  renderCreditors();
}

function renderCreditors() {
  const div = document.getElementById('creditorsList');
  if(!creditors.length) {
    div.innerHTML='<div class="col-span-3 text-center py-12 text-gray-400"><div class="text-5xl mb-3">👤</div><p>لا يوجد دائنون بعد</p></div>';
    return;
  }
  div.innerHTML = creditors.map(c=>{
    const cDebts = debts.filter(d=>d.creditorId===c.id);
    const totalD = cDebts.reduce((s,d)=>s+Number(d.totalAmount),0);
    const totalP = cDebts.reduce((s,d)=>s+totalPaid(d.id),0);
    return `<div class="bg-white rounded-2xl shadow p-5 hover:shadow-md transition">
      <div class="flex justify-between items-start mb-3">
        <div>
          <h3 class="font-black text-slate-800 text-lg">${c.name}</h3>
          ${c.phone?`<p class="text-sm text-gray-400">📞 ${c.phone}</p>`:''}
          ${c.notes?`<p class="text-xs text-gray-400 mt-1">${c.notes}</p>`:''}
        </div>
        <button onclick="confirmDeleteCreditor('${c.id}')" class="text-red-300 hover:text-red-500 text-xl">🗑</button>
      </div>
      <div class="grid grid-cols-3 gap-2 text-center border-t pt-3">
        <div><p class="text-xs text-gray-400">إجمالي</p><p class="font-bold text-slate-700 text-sm">${fmt(totalD)}</p></div>
        <div><p class="text-xs text-gray-400">مدفوع</p><p class="font-bold text-green-600 text-sm">${fmt(totalP)}</p></div>
        <div><p class="text-xs text-gray-400">متبقي</p><p class="font-bold text-red-600 text-sm">${fmt(totalD-totalP)}</p></div>
      </div>
    </div>`;
  }).join('');
}

function confirmDeleteCreditor(id) {
  document.getElementById('confirmMsg').textContent='حذف الدائن سيحذف جميع ديونه ودفعاته. هل أنت متأكد؟';
  document.getElementById('confirmYes').onclick=()=>{ deleteCreditor(id); };
  openModal('modalConfirm');
}
function deleteCreditor(id) {
  const dIds = debts.filter(d=>d.creditorId===id).map(d=>d.id);
  payments  = payments.filter(p=>!dIds.includes(p.debtId));
  debts     = debts.filter(d=>d.creditorId!==id);
  creditors = creditors.filter(c=>c.id!==id);
  save(); closeModal('modalConfirm'); renderCreditors(); refreshCreditorSelect();
}

// ---------- DEBTS ----------
function updatePreview() {
  const total = parseFloat(document.getElementById('dt-total').value);
  const inst  = parseFloat(document.getElementById('dt-inst').value);
  const start = document.getElementById('dt-start').value;
  const freq  = document.getElementById('dt-freq').value;
  const cdays = parseInt(document.getElementById('dt-customdays').value)||0;
  const prev  = document.getElementById('debtPreview');
  if(!total||!inst||!start||(freq==='custom'&&!cdays)) { prev.classList.add('hidden'); return; }
  const freqDays = freq==='custom'?cdays:parseInt(freq);
  const count = Math.ceil(total/inst);
  const endDate = new Date(start+'T00:00:00');
  endDate.setDate(endDate.getDate()+(count-1)*freqDays);
  const freqLabel = {7:'أسبوعي',14:'كل أسبوعين',30:'شهري'}[freq]||`كل ${freqDays} يوم`;
  document.getElementById('previewText').innerHTML =
    `📊 عدد الدفعات: <b>${count}</b> — تكرار: <b>${freqLabel}</b> — آخر دفعة: <b>${fmtDate(endDate.toISOString().split('T')[0])}</b>`;
  prev.classList.remove('hidden');
}

function saveDebt() {
  const creditorId = document.getElementById('dt-creditor').value;
  const desc       = document.getElementById('dt-desc').value.trim();
  const totalAmount= parseFloat(document.getElementById('dt-total').value);
  const instAmount = parseFloat(document.getElementById('dt-inst').value);
  const freq       = document.getElementById('dt-freq').value;
  const customDays = parseInt(document.getElementById('dt-customdays').value)||0;
  const startDate  = document.getElementById('dt-start').value;
  if(!creditorId)          return alert('اختر الدائن');
  if(!desc)                return alert('أدخل وصف الدين');
  if(!totalAmount||totalAmount<=0) return alert('أدخل المبلغ الكلي');
  if(!instAmount||instAmount<=0)   return alert('أدخل مبلغ الدفعة');
  if(instAmount>totalAmount)       return alert('مبلغ الدفعة أكبر من المبلغ الكلي!');
  if(freq==='custom'&&!customDays) return alert('أدخل عدد الأيام');
  if(!startDate)           return alert('اختر تاريخ أول دفعة');
  debts.push({ id:uid(), creditorId, desc, totalAmount, instAmount, freq, customDays, startDate });
  save();
  closeModal('modalDebt');
  ['dt-desc','dt-total','dt-inst','dt-start','dt-customdays'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('dt-creditor').value='';
  document.getElementById('dt-freq').value='7';
  document.getElementById('customFreqDiv').classList.add('hidden');
  document.getElementById('debtPreview').classList.add('hidden');
  renderDebts(); renderAlerts();
}

function renderDebts() {
  const div = document.getElementById('debtsList');
  if(!debts.length) {
    div.innerHTML='<div class="text-center py-12 text-gray-400"><div class="text-5xl mb-3">📋</div><p>لا توجد ديون مسجلة بعد</p></div>';
    return;
  }
  div.innerHTML = debts.map(debt=>{
    const sched = buildSchedule(debt);
    const paid  = totalPaid(debt.id);
    const rem   = Number(debt.totalAmount)-paid;
    const paidCount = sched.filter(s=>isInstPaid(debt.id,s.idx)).length;
    const overdueCount = sched.filter(s=>instStatus(debt.id,s)==='overdue').length;
    const pct = Math.round((paid/Number(debt.totalAmount))*100);
    const freqLabel = {7:'أسبوعي',14:'كل أسبوعين',30:'شهري'}[debt.freq]||`كل ${debt.customDays} يوم`;
    const isComplete = rem<=0;
    return `<div class="bg-white rounded-2xl shadow p-5 hover:shadow-md transition ${overdueCount?'border-r-4 border-red-400':''}">
      <div class="flex items-start justify-between flex-wrap gap-2">
        <div>
          <div class="flex items-center gap-2 flex-wrap">
            <h3 class="font-black text-slate-800 text-lg">${debt.desc}</h3>
            ${isComplete?'<span class="bg-green-100 text-green-700 text-xs px-2 py-0.5 rounded-full font-bold">✓ مكتمل</span>':''}
            ${overdueCount?`<span class="bg-red-100 text-red-700 text-xs px-2 py-0.5 rounded-full font-bold">⚠ ${overdueCount} متأخر</span>`:''}
          </div>
          <p class="text-gray-500 text-sm">الدائن: <b class="text-slate-700">${creditorName(debt.creditorId)}</b> — ${freqLabel} — دفعة ${fmt(debt.instAmount)} د.ع</p>
        </div>
        <div class="flex gap-2">
          <button onclick="openDetailModal('${debt.id}')" class="bg-slate-100 hover:bg-slate-200 text-slate-700 text-sm px-3 py-1.5 rounded-xl font-bold transition">تفاصيل</button>
          <button onclick="confirmDeleteDebt('${debt.id}')" class="text-red-300 hover:text-red-500 text-xl">🗑</button>
        </div>
      </div>
      <!-- Progress -->
      <div class="mt-4">
        <div class="flex justify-between text-xs text-gray-400 mb-1">
          <span>مدفوع: <b class="text-green-600">${fmt(paid)}</b> د.ع</span>
          <span>متبقي: <b class="text-red-600">${fmt(Math.max(0,rem))}</b> د.ع</span>
          <span><b>${pct}%</b></span>
        </div>
        <div class="bg-gray-100 rounded-full h-3">
          <div class="bg-gradient-to-l from-green-500 to-green-400 h-3 rounded-full transition-all" style="width:${pct}%"></div>
        </div>
        <div class="flex justify-between text-xs text-gray-400 mt-1">
          <span>الإجمالي: <b>${fmt(debt.totalAmount)}</b> د.ع</span>
          <span>${paidCount} / ${sched.length} دفعة</span>
        </div>
      </div>
    </div>`;
  }).join('');
}

function confirmDeleteDebt(id) {
  document.getElementById('confirmMsg').textContent='حذف الدين سيحذف جميع دفعاته المسجلة. هل أنت متأكد؟';
  document.getElementById('confirmYes').onclick=()=>{ deleteDebt(id); };
  openModal('modalConfirm');
}
function deleteDebt(id) {
  payments = payments.filter(p=>p.debtId!==id);
  debts    = debts.filter(d=>d.id!==id);
  save(); closeModal('modalConfirm'); renderDebts(); renderDashboard();
}

// ---------- DETAIL MODAL ----------
function openDetailModal(debtId) {
  const debt = debts.find(d=>d.id===debtId);
  if(!debt) return;
  const sched = buildSchedule(debt);
  const paid  = totalPaid(debtId);
  const rem   = Math.max(0, Number(debt.totalAmount)-paid);
  const pct   = Math.round((paid/Number(debt.totalAmount))*100);
  const freqLabel = {7:'أسبوعي',14:'كل أسبوعين',30:'شهري'}[debt.freq]||`كل ${debt.customDays} يوم`;
  const pastPayments = payments.filter(p=>p.debtId===debtId).sort((a,b)=>new Date(a.date)-new Date(b.date));

  document.getElementById('detailTitle').textContent = `${debt.desc} — ${creditorName(debt.creditorId)}`;

  let html = `<div id="printArea">
  <!-- Summary -->
  <div class="grid grid-cols-3 gap-3 mb-5">
    <div class="bg-slate-50 rounded-xl p-3 text-center">
      <p class="text-xs text-gray-400">الإجمالي</p>
      <p class="font-black text-slate-700">${fmt(debt.totalAmount)} د.ع</p>
    </div>
    <div class="bg-green-50 rounded-xl p-3 text-center">
      <p class="text-xs text-gray-400">المدفوع</p>
      <p class="font-black text-green-700">${fmt(paid)} د.ع</p>
    </div>
    <div class="bg-red-50 rounded-xl p-3 text-center">
      <p class="text-xs text-gray-400">المتبقي</p>
      <p class="font-black text-red-700">${fmt(rem)} د.ع</p>
    </div>
  </div>
  <div class="bg-gray-50 rounded-xl p-3 mb-5 text-sm text-gray-600">
    <div class="flex justify-between items-center mb-2">
      <span>نسبة الإنجاز: <b>${pct}%</b></span>
      <span>${freqLabel} — دفعة ${fmt(debt.instAmount)} د.ع</span>
    </div>
    <div class="bg-gray-200 rounded-full h-3">
      <div class="bg-gradient-to-l from-green-500 to-green-400 h-3 rounded-full" style="width:${pct}%"></div>
    </div>
  </div>

  <!-- Past Payments -->
  <h4 class="font-black text-slate-700 mb-2">✅ الدفعات المسددة (${pastPayments.length})</h4>
  ${pastPayments.length ? `<div class="space-y-2 mb-5">` + pastPayments.map((p,i)=>{
    const inst = sched.find(s=>s.idx===p.instIdx);
    return `<div class="flex items-center justify-between bg-green-50 border border-green-100 rounded-xl px-4 py-2.5">
      <div>
        <p class="font-semibold text-sm text-green-800">دفعة #${i+1}${inst?` (موعدها: ${fmtDate(inst.dueDate)})`:''}  </p>
        <p class="text-xs text-gray-400">تم الدفع: ${fmtDate(p.date)}${p.note?' — '+p.note:''}</p>
      </div>
      <div class="flex items-center gap-2">
        <span class="font-black text-green-700">${fmt(p.amount)} د.ع</span>
        <button onclick="confirmDeletePayment('${p.id}')" class="text-red-300 hover:text-red-500 text-sm no-print">🗑</button>
      </div>
    </div>`;
  }).join('') + '</div>'
  : '<p class="text-gray-400 text-sm text-center py-3 mb-5">لا توجد دفعات مسددة بعد</p>'}

  <!-- Schedule -->
  <h4 class="font-black text-slate-700 mb-2">📅 جدول جميع الدفعات</h4>
  <div class="space-y-2">
  ${sched.map(inst=>{
    const st   = instStatus(debtId, inst);
    const pay  = getInstPayment(debtId, inst.idx)[0];
    const d    = daysDiff(inst.dueDate);
    const badges = {
      paid:    'bg-green-100 text-green-700 border border-green-200',
      overdue: 'bg-red-100 text-red-700 border border-red-200',
      soon:    'bg-amber-100 text-amber-700 border border-amber-200',
      upcoming:'bg-gray-50 text-gray-600 border border-gray-200'
    };
    const labels = { paid:'✓ مسدد', overdue:'⚠ متأخر', soon:`⏰ بعد ${d} يوم`, upcoming:`📅 ${fmtDate(inst.dueDate)}` };
    return `<div class="flex items-center justify-between ${badges[st]} rounded-xl px-4 py-2.5">
      <div class="flex-1 min-w-0">
        <p class="font-semibold text-sm">دفعة ${inst.idx+1} — ${fmt(inst.amount)} د.ع</p>
        <p class="text-xs opacity-70">موعد الاستحقاق: ${fmtDate(inst.dueDate)}${pay?' | دُفع: '+fmtDate(pay.date):''}</p>
      </div>
      <div class="flex items-center gap-2 shrink-0">
        <span class="text-xs font-bold">${labels[st]}</span>
        ${st!=='paid'?`<button onclick="openPayModal('${debtId}',${inst.idx})" class="text-xs bg-white border border-current px-2 py-0.5 rounded-lg font-bold hover:opacity-80 transition no-print">تسديد</button>`:''}
      </div>
    </div>`;
  }).join('')}
  </div>
  </div>`;

  document.getElementById('detailContent').innerHTML = html;
  openModal('modalDetail');
}

  const title   = document.getElementById('detailTitle').textContent;
  const win = window.open('','','width=900,height=700');
  win.document.write(`<!DOCTYPE html><html dir="rtl"><head><meta charset="UTF-8">

// ---------- PAYMENTS ----------
function openPayModal(debtId, instIdx) {
  const debt = debts.find(d=>d.id===debtId);
  const sched = buildSchedule(debt);
  const inst  = sched[instIdx];
  const paid  = totalPaid(debtId);
  const rem   = Math.max(0, Number(debt.totalAmount)-paid);
  document.getElementById('pay-debtId').value  = debtId;
  document.getElementById('pay-instIdx').value = instIdx;
  document.getElementById('payInfo').innerHTML = `
    <p class="font-bold text-slate-800">${creditorName(debt.creditorId)} — ${debt.desc}</p>
    <p class="text-xs mt-1 text-gray-500">دفعة #${instIdx+1} — موعد: ${fmtDate(inst.dueDate)}</p>
    <div class="flex gap-4 mt-2 text-xs">
      <span>الكلي: <b>${fmt(debt.totalAmount)}</b> د.ع</span>
      <span class="text-green-700">مدفوع: <b>${fmt(paid)}</b></span>
      <span class="text-red-700">متبقي: <b>${fmt(rem)}</b></span>
    </div>`;
  document.getElementById('pay-amount').value = inst.amount;
  document.getElementById('pay-date').value   = today();
  document.getElementById('pay-note').value   = '';
  closeModal('modalDetail');
  openModal('modalPay');
}

function savePayment() {
  const debtId  = document.getElementById('pay-debtId').value;
  const instIdx = parseInt(document.getElementById('pay-instIdx').value);
  const amount  = parseFloat(document.getElementById('pay-amount').value);
  const date    = document.getElementById('pay-date').value;
  if(!amount||amount<=0) return alert('أدخل المبلغ');
  if(!date)              return alert('اختر تاريخ الدفع');
  const debt = debts.find(d=>d.id===debtId);
  const rem  = Math.max(0, Number(debt.totalAmount)-totalPaid(debtId));
  if(amount>rem+0.01)    return alert(`المبلغ أكبر من المتبقي (${fmt(rem)} د.ع)!`);
  if(isInstPaid(debtId,instIdx)) return alert('هذه الدفعة مسددة مسبقاً!');
  payments.push({ id:uid(), debtId, instIdx, amount, date, note:document.getElementById('pay-note').value.trim() });
  save();
  closeModal('modalPay');
  renderDashboard(); renderDebts(); renderAlerts();
}

function confirmDeletePayment(id) {
  document.getElementById('confirmMsg').textContent='هل تريد حذف هذه الدفعة؟';
  document.getElementById('confirmYes').onclick=()=>{ deletePayment(id); };
  openModal('modalConfirm');
}
function deletePayment(id) {
  const p = payments.find(x=>x.id===id);
  payments = payments.filter(x=>x.id!==id);
  save(); closeModal('modalConfirm'); closeModal('modalDetail');
  if(p) openDetailModal(p.debtId);
  renderDashboard(); renderDebts(); renderAlerts();
}
</script>
